# Clippy configuration for a robust Rust open source project

# Ban `unwrap` to prevent runtime panics (a panic crossing the FFI boundary
# crashes the iOS app). This is enforced by `clippy::unwrap_used`, configured in
# Cargo.toml's `[lints.clippy]` table — NOT via `disallowed-methods`. Reason:
# `disallowed-methods` lints *through* external macro expansions, so it spuriously
# flagged ~970 `serde_json::json!` sites (the macro expands to an internal
# `to_value(&x).unwrap()` at macros.rs:279), and it ignores `allow-unwrap-in-tests`
# below. `clippy::unwrap_used` is the purpose-built lint: it skips external-macro
# unwraps and honors the test allowance, while still catching our hand-written
# unwraps. Same intent, correct tool. See STATUS_MESH_LINT.md.
disallowed-methods = []

# Error on `todo!()` macros in code to prevent shipping incomplete code
# To allow these during development, comment this line out
#disallowed-macros = ["std::todo"]

# Complexity thresholds
too-many-arguments-threshold = 7
too-many-lines-threshold = 150
type-complexity-threshold = 250
cognitive-complexity-threshold = 15

# Doc comments
doc-valid-idents = ["OAuth", "GitHub", "GitLab", "TypeScript", "JavaScript", "WebAssembly", "WebGL", "REST", "API", "GraphQL", "RPC", "TCP", "UDP", "HTTP", "HTTPS", "TLS", "SSL", "JSON", "TOML", "YAML", "HTML", "CSS", "DOM", "UUID", "SQL"]

# Allow certain behaviors in tests
allow-expect-in-tests = true
allow-unwrap-in-tests = true
allow-panic-in-tests = true

# Other configuration (uncomment if needed)
# enum-variant-size-threshold = 200
# vec-box-size-threshold = 4000
# trivial-copy-size-limit = 1024

# Modules to exclude from Clippy checks
# You might want to exclude tests or generated code
# Example: exclude = ["tests/", "generated/"]